      - OPENCLAW_DB_PATH=/app/runtime/openclaw.db
      - OPENCLAW_DEFAULT_SCOPE=project
      - OPENCLAW_ALLOWED_SCOPE_PREFIXES=project,project-a
      - OPENCLAW_API_KEY=${OPENCLAW_API_KEY}
      - OPENCLAW_CORS_ORIGIN=${OPENCLAW_CORS_ORIGIN:-*}
